<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login" text="" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding auth-content">
  <div class="header-section">
    <h1>Crea tu cuenta</h1>
    <p>Regístrate para empezar a organizar tus finanzas</p>
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
    <ion-list lines="none" class="auth-list">
      <ion-item class="auth-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input label="Nombre completo" labelPlacement="stacked"
                   type="text" formControlName="name"
                   placeholder="Tu nombre"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input label="Correo Electrónico" labelPlacement="stacked"
                   type="email" formControlName="email"
                   placeholder="ejemplo@correo.com"></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input label="Contraseña" labelPlacement="stacked"
                   type="password" formControlName="password"
                   placeholder="Mínimo 4 caracteres"></ion-input>
      </ion-item>
    </ion-list>

    <div class="ion-padding-top">
      <ion-button expand="block" shape="round" type="submit" [disabled]="registerForm.invalid">
        Registrarse
      </ion-button>
      <p class="login-link ion-text-center" (click)="goToLogin()">¿Ya tienes cuenta? <strong>Ingresa aquí</strong></p>
    </div>
  </form>
</ion-content>
